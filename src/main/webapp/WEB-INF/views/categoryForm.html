<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">➕ 새 카테고리 등록</h4>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
                    <div class="mb-3">
                        <label th:for="name" class="form-label fw-bold">카테고리 이름</label>
                        <input type="text" th:field="*{name}" class="form-control"
                               placeholder="예: 가전제품, 의류" th:errorclass="is-invalid"/>
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a th:href="@{/categories}" class="btn btn-secondary me-md-2">취소</a>
                        <button type="submit" class="btn btn-primary px-4">등록하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<hr class="mt-5">
<footer class="text-muted small text-center pb-4">
    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2071124 | 이름: 정진우'}"></p>
</footer>

</body>
</html>
