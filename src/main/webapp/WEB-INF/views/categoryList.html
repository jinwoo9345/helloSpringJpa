<!DOCTYPE html>
<html lang="en">
<head lang="ko" xmlns:th="http://www.thymeleaf.org">
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!-- categoryList.html : 성공/오류 Flash 메시지 표시 -->
<p th:if="${successMessage}" th:text="${successMessage}"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}"></p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리명</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<hr>
<footer>
    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')
        +' | 학번: 2071124 |'+ ' 이름 : 정진우'}"></p>
</footer>
</body>

</html>
